
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FreeWalkins Updates</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f3f6fb;padding:12px;padding-bottom:100px;}
.wrapper{
  max-width:700px;
  margin:auto;
}
.header{
  background:linear-gradient(135deg,#0f9b0f,#38ef7d);
  color:#fff;
  padding:14px;
  border-radius:12px;
  text-align:center;
  margin-bottom:12px;
}
.header h1{
  font-size:24px;
}
.header p{
  font-size:14px;
  margin-top:4px;
}

.job-card{
  background:#fff;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.job-card h3{font-size:18px;margin-bottom:6px}
.job-card p{font-size:14px;margin:4px 0}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#16a34a;
  color:#fff;
  cursor:pointer;
}

.container{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:95%;
  max-width:520px;
  max-height:90vh;
  overflow:auto;
  background:#fff;
  border-radius:15px;
  padding:20px;
  z-index:1000;
  box-shadow:0 10px 30px rgba(0,0,0,.3);
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:6px 0 12px;
  border:1px solid #ddd;
  border-radius:10px;
}

#appliedFor{
  background:#f3f4f6;
  font-weight:bold;
  color:#16a34a;
}

.popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  justify-content:center;
  align-items:center;
}

.popup-content{
  background:#fff;
  padding:20px;
  border-radius:15px;
  text-align:center;
  width:300px;
}

.footer-support{
position:fixed;bottom:12px;left:50%;transform:translateX(-50%);width:94%;max-width:700px;display:flex;gap:12px;z-index:9999;}
.footer-support a{text-decoration:none;flex:1;}
.footer-btn{padding:14px 12px;border-radius:18px;text-align:center;color:#fff;font-weight:700;box-shadow:0 8px 20px rgba(0,0,0,.18);backdrop-filter:blur(10px);transition:.2s;}
.footer-btn:hover{transform:translateY(-2px);}
.wa-btn{background:linear-gradient(135deg,#25D366,#128C7E);}
.insta-btn{background:linear-gradient(135deg,#f58529,#e1306c,#833ab4);}


@media(max-width:600px){
.header h1{font-size:22px}
.job-card h3{font-size:17px}
button,.footer-btn{font-size:14px}
body{padding:8px;padding-bottom:85px;}
}

</style>
</head>

<body>

<div class="wrapper">

<div class="header">
<h1>🚀 FreeWalkins Updates</h1>
<p>Latest Job Openings in Hyderabad</p>
<div style="margin-top:10px;font-size:13px;background:rgba(255,255,255,.15);padding:8px;border-radius:10px">
⭐ Daily Walk-ins | Instant Apply | Trusted Job Updates
</div>
</div>


<div style="background:#fff;padding:12px;border-radius:12px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)">
<input id="searchInput" placeholder="🔍 Search Jobs" oninput="renderJobs()">
<select id="jobFilter" onchange="renderJobs()"><option value="">💼 All Jobs</option></select>
<select id="locationFilter" onchange="renderJobs()"><option value="">📍 All Locations</option></select>
</div>

<div id="jobsContainer">Loading jobs...</div>

<div class="container" id="formContainer">

<button type="button"
onclick="document.getElementById('formContainer').style.display='none'"
style="background:#ef4444;margin-bottom:10px">
❌ Close
</button>

<h2>🎯 VenuHR Registration</h2><br>

<form id="candidateForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="tel" id="mobile" placeholder="Mobile Number"
required maxlength="10">

<input type="email" id="email" placeholder="Email" required>

<input type="date" id="dob" required>

<select id="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<select id="qualification" required>
<option value="">Select Qualification</option>
<option>SSC</option>
<option>Intermediate</option>
<option>Diploma</option>
<option>ITI</option>
<option>Degree</option>
<option>B.Com</option>
<option>B.Sc</option>
<option>BA</option>
<option>BBA</option>
<option>BCA</option>
<option>B.Tech</option>
<option>B.Pharmacy</option>
<option>D.Pharmacy</option>
<option>MBA</option>
<option>MCA</option>
<option>M.Tech</option>
<option>M.Com</option>
<option>M.Sc</option>
<option>LLB</option>
<option>LLM</option>
<option>PhD</option>
<option>Other</option>
</select>

<input id="specialization"
placeholder="Specialization" required>

<label><b>Applied For</b></label>
<input id="appliedFor" readonly required>

<select id="experience" required>
<option value="">Select Experience</option>
<option>Fresher</option>
<option>0-6 Months</option>
<option>6 Months - 1 Year</option>
<option>1-2 Years</option>
<option>2-3 Years</option>
<option>3-5 Years</option>
<option>5-7 Years</option>
<option>7-10 Years</option>
<option>10+ Years</option>
</select>

<input id="location"
placeholder="Current Location" required>

<textarea id="address"
placeholder="Address"></textarea>

<button type="submit">🚀 Submit Application</button>

</form>
</div>
</div>

<div class="popup" id="successPopup">
<div class="popup-content">
<h3 id="popupTitle">Application Submitted</h3>
<p id="popupMessage">Application Submitted Successfully</p>
<button onclick="document.getElementById('successPopup').style.display='none'">
OK
</button>
</div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbxz1q8J8DoZNpNtiT9yeZ2bXTcqrukf0F387YHAxm8v6OCHE9A8FH_FGJwVbLEh315YZQ/exec";
let allJobs=[];

async function loadJobs(){

 try{

   const res=await fetch(API_URL+"?action=getJobs");
   allJobs=await res.json();
   const jobs=allJobs;

   let html="";

   jobs.forEach(job=>{

     const title=String(job.title).replace(/'/g,"\\'");

     html+=`
     <div class="job-card">
       <h3>${job.title}</h3>
       <p>🏢 ${job.company}</p>
       <p>📍 ${job.location}</p>
       <p>💰 ₹${job.salary}</p>
      <p>🕒 ${job.jobType || 'Full Time'}</p>
      <p>📞 ${job.whatsapp || ''}</p>
      <button onclick="showForm('${title}')">
         Apply Now
      </button>
      ${job.whatsapp ? `<a href="https://wa.me/91${job.whatsapp}" target="_blank"><button style="background:#25D366;margin-top:6px">💬 WhatsApp HR</button></a>` : ''}
     </div>`;

   });

   document.getElementById("jobsContainer").innerHTML=html;

   const jt=[...new Set(allJobs.map(x=>x.title))];
   const lc=[...new Set(allJobs.map(x=>x.location))];
   document.getElementById("jobFilter").innerHTML='<option value="">💼 All Jobs</option>'+jt.map(x=>`<option>${x}</option>`).join('');
   document.getElementById("locationFilter").innerHTML='<option value="">📍 All Locations</option>'+lc.map(x=>`<option>${x}</option>`).join('');

 }catch(e){

   document.getElementById("jobsContainer").innerHTML=
   "Jobs loading failed";

   console.log(e);
 }
}


function renderJobs(){
 const s=document.getElementById("searchInput").value.toLowerCase();
 const j=document.getElementById("jobFilter").value;
 const l=document.getElementById("locationFilter").value;
 let out="";
 allJobs.filter(x=>(!s||x.title.toLowerCase().includes(s)||x.company.toLowerCase().includes(s))&&(!j||x.title===j)&&(!l||x.location===l)).forEach(job=>{
 const title=String(job.title).replace(/'/g,"\\'");
 out+=`<div class="job-card"><h3>${job.title}</h3><p>🏢 ${job.company}</p><p>📍 ${job.location}</p><p>💰 ₹${job.salary}</p><p>🕒 ${job.jobType || 'Full Time'}</p><p>📞 ${job.whatsapp || ''}</p><button onclick="showForm('${title}')">Apply Now</button>${job.whatsapp ? `<a href="https://wa.me/91${job.whatsapp}" target="_blank"><button style="background:#25D366;margin-top:6px">💬 WhatsApp HR</button></a>` : ''}</div>`;
 });
 document.getElementById("jobsContainer").innerHTML=out||"No jobs found";
}

function showForm(job){

 document.getElementById("appliedFor").value=job;

 document.getElementById("formContainer").style.display="block";

}

document.getElementById("candidateForm")
.addEventListener("submit",async function(e){

 e.preventDefault();

 const data={
  name:document.getElementById("name").value,
  mobile:document.getElementById("mobile").value,
  email:document.getElementById("email").value,
  dob:document.getElementById("dob").value,
  gender:document.getElementById("gender").value,
  qualification:document.getElementById("qualification").value,
  specialization:document.getElementById("specialization").value,
  appliedFor:document.getElementById("appliedFor").value,
  experience:document.getElementById("experience").value,
  location:document.getElementById("location").value,
  address:document.getElementById("address").value
 };

 try{

   const response = await fetch(API_URL,{
     method:"POST",
     headers:{
       "Content-Type":"text/plain;charset=utf-8"
     },
     body:JSON.stringify(data)
   });

   const result = await response.json();

   if(result.success){

     document.getElementById("popupTitle").innerText =
     "Application Submitted";

     document.getElementById("popupMessage").innerHTML =
     "✅ Application Submitted Successfully<br><br>Application ID: <b>" +
     (result.appId || "") + "</b>";

     document.getElementById("successPopup").style.display = "flex";

     document.getElementById("candidateForm").reset();
     document.getElementById("formContainer").style.display = "none";

   }else{

     document.getElementById("formContainer").style.display = "none";

     document.getElementById("popupTitle").innerText =
     "Already Registered";

     document.getElementById("popupMessage").innerHTML =
     "❌ " + (result.message || "Mobile Number Already Registered");

     document.getElementById("successPopup").style.display = "flex";

   }

 }catch(err){

   alert("Submission Failed");
 }
});

loadJobs();
</script>


<div class="footer-support">
<a href="https://wa.me/916305232525" target="_blank">
<div class="footer-btn wa-btn">💬 WhatsApp Support</div>
</a>
<a href="https://instagram.com/walkins_updates" target="_blank">
<div class="footer-btn insta-btn">📸 Follow @walkins_updates</div>
</a>
</div>

</body>
</html>
